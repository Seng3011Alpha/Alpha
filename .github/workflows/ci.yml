name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: event-intelligence-service/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: event-intelligence-service/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linting & type checking tools
        run: pip install flake8 mypy types-requests

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (max line length 120)
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  #Informational for now harden in Sprint 2

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: event-intelligence-service/backend/coverage.xml
